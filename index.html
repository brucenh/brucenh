<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruce N.H.</title>
<style>
  /* reset */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* theme variables — default is dark (black bg / white text) */
  :root {
    --bg: #000000;
    --fg: #ffffff;
    --building-fg: var(--fg);
  }
  :root.light {
    --bg: #ffffff;
    --fg: #000000;
    --building-fg: #00008b; /* deep blue in light mode */
  }

  /* base */
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: Menlo, 'DejaVu Sans Mono', 'Ubuntu Mono', Consolas, 'Liberation Mono', monospace;
    line-height: 1.6;
    padding: 60px 20px;
    max-width: 640px;
    margin: 0 auto;
    transition: background 0.2s ease, color 0.2s ease;
  }

  /* headers */
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.95rem;
    font-weight: 400;
    margin-bottom: 40px;
  }

  h2 {
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 36px;
    margin-bottom: 12px;
    padding-bottom: 4px;
  }

  /* links */
  ul {
    list-style: none;
  }

  li {
    margin-bottom: 8px;
  }

  a {
    color: var(--fg);
    font-weight: 700;
    text-decoration: none;
  }

  a:hover {
    background: var(--fg);
    color: var(--bg);
  }

  .label {
    font-weight: 400;
  }

  /* theme toggle */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--fg);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .theme-toggle:hover {
    background: var(--fg);
    color: var(--bg);
  }

  /* footer */
  footer {
    margin-top: 60px;
    font-size: 0.9rem;
    font-weight: 400;
  }

  /* typed "building at " text */
  .building {
    color: var(--building-fg);
    transition: color 0.2s ease;
  }

  /* blinking terminal cursor — decorative only */
  .cursor {
    display: inline-block;
    width: 0.6em;
    height: 1.1em;
    background: var(--fg);
    vertical-align: text-bottom;
    animation: blink 1s steps(1) infinite;
    pointer-events: none;
    user-select: none;
  }

  @keyframes blink {
    0%, 50%   { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }
</style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle color scheme">Light</button>

  <h1>Bruce N.H.</h1>
  <div class="subtitle">mechanistic interpretability / quantitative systems</div>

  <h2>Links</h2>
  <ul>
    <li><span class="label">GitHub:</span> <a href="https://github.com/brucenh" target="_blank">github.com/brucenh</a></li>
    <li><span class="label">LinkedIn:</span> <a href="https://linkedin.com/in/brucenh" target="_blank">linkedin.com/in/brucenh</a></li>
    <li><span class="label">Paper:</span> <a href="https://www.overleaf.com/read/dcrxkbfjkpvs#614e4f" target="_blank">Detecting and Steering Deception Representations in LLM Reasoning Traces</a></li>
    <li><span class="label">Resume:</span> <a href="resume.pdf" target="_blank">view resume</a></li>
  </ul>

  <footer>
    <span class="building" id="building"></span><span class="cursor" aria-hidden="true"></span>
  </footer>

  <script>
    (function () {
      var root = document.documentElement;
      var toggle = document.getElementById('themeToggle');

      // restore saved preference
      var saved = localStorage.getItem('theme');
      if (saved === 'light') {
        root.classList.add('light');
      }

      function syncLabel() {
        var isLight = root.classList.contains('light');
        toggle.textContent = isLight ? 'Dark' : 'Light';
      }
      syncLabel();

      toggle.addEventListener('click', function () {
        root.classList.toggle('light');
        localStorage.setItem('theme', root.classList.contains('light') ? 'light' : 'dark');
        syncLabel();
      });

      // type out "building at " on load, leaving the cursor at the end
      var building = document.getElementById('building');
      var text = 'building AI at Laplace Research';
      var i = 0;
      (function type() {
        if (i < text.length) {
          building.textContent += text.charAt(i);
          i++;
          setTimeout(type, 90);
        }
      })();
    })();
  </script>

</body>
</html>
